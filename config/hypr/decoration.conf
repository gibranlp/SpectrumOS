# SpectrumOS Hyprland Configuration
# Decoration

decoration {
    rounding = 10    

    blur {
        enabled = true
        size = 6
        passes = 3
        new_optimizations = true # Still supported in many versions, but always on now
        xray = true
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 20
        render_power = 3
        color = rgba(0, 0, 0, 0.5)
        color_inactive = rgba(0, 0, 0, 0.2)
    }
}
