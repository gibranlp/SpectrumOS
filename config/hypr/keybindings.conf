# SpectrumOS Hyprland Configuration
# Keybindings

$mainMod = SUPER

# Open Terminal
bind = $mainMod, Return, exec, kitty
# Close Window
bind = $mainMod, Q, killactive
# Logout close Hyprland session 
bind = $mainMod, M, exit
# Open File Manager
bind = $mainMod, E, exec, thunar
# Toggle Floating
bind = $mainMod, Space, togglefloating
# Launch Rofi App Launcher
bind = $mainMod, D, exec, /usr/share/spectrumos/scripts/SOS_Launcher.sh
# Launch SpectrumOS Panel
bind = $mainMod, P, exec, /usr/share/spectrumos/scripts/SOS_Panel.sh
# Toggle Split/Unsplittable
bind = $mainMod, J, togglesplit
# Toggle Fullscreen
bind = $mainMod, F, fullscreen
# Cycle Layouts
bind = CTRL, Tab, exec, /usr/share/spectrumos/scripts/SOS_Cycle_Layouts.sh
# Set Default Layout
bind = CTRL SHIFT, Tab, exec, /usr/share/spectrumos/scripts/SOS_Set_Default_Layout.sh
# Select Wallpaper Rofi
bind = $mainMod, W, exec, /usr/share/spectrumos/scripts/SOS_Select_Wallpaper.sh
# Set Random Wallpaper/Colors
bind = $mainMod, R, exec, /usr/share/spectrumos/scripts/SOS_Randomize_Wallpaper.sh
# Search Files and folders
bind = $mainMod, S, exec, /usr/share/spectrumos/scripts/SOS_Search.sh
# Lock Screen
bind = $mainMod, L, exec, hyprlock
# SpectrumOS Wifi Manager
bind = $mainMod, B, exec, /usr/share/spectrumos/scripts/SOS_Wifi.sh
# SpectrumOS Audio Manager
bind = $mainMod, A, exec, /usr/share/spectrumos/scripts/SOS_Audio.sh
# Show Emojis
bind = $mainMod, V, exec, rofi -modi emoji -show emoji -theme '~/.config/rofi/SOS_Left.rasi' -emoji-format
# Color Picker
bind = $mainMod, I, exec, COLOR=$(hyprpicker -r) && echo "$COLOR" | wl-copy && notify-send "🖌️ Color" "$COLOR" -h string:bgcolor:"$COLOR" -u normal

# Password Generator
bind = $mainMod, G, exec, /usr/share/spectrumos/scripts/SOS_Pass_Generator.sh

# Session Manager
bind = $mainMod, X, exec, /usr/share/spectrumos/scripts/SOS_Session.sh

# Screenshots
bind = , Print, exec, /usr/share/spectrumos/scripts/SOS_Screenshot.sh

# Clear Dunst notifications
bind = CTRL, Space, exec, dunstctl close
bind = CTRL SHIFT, Space, exec, dunstctl close-all

# Media keys
binde = , XF86AudioRaiseVolume, exec, pamixer -i 5
binde = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Brightness
binde = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
binde = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# Move focus
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Resize windows
bind = $mainMod CTRL, left, resizeactive, -20 0
bind = $mainMod CTRL, right, resizeactive, 20 0
bind = $mainMod CTRL, up, resizeactive, 0 -20
bind = $mainMod CTRL, down, resizeactive, 0 20

# Switch workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6


# Move window to workspace
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6

# Move Windows
bind = $mainMod SHIFT, left, movewindow, l
bind = $mainMod SHIFT, right, movewindow, r
bind = $mainMod SHIFT, up, movewindow, u
bind = $mainMod SHIFT, down, movewindow, d


# Scroll through workspaces
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mouse
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
