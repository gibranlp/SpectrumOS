# SpectrumOS Hyprland Configuration
# Window rules - New 2025 Unified Syntax

# Float Rules
windowrule = float 1, match:class ^(pavucontrol)$
windowrule = float 1, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = float 1, match:class ^(blueman-manager)$
windowrule = float 1, match:class ^(nm-connection-editor)$
windowrule = float 1, match:class ^(file-roller)$
windowrule = float 1, match:class ^(rofi)$
windowrule = float 1, match:title ^(Picture-in-Picture)$

# Thunar and File Dialogs
windowrule = float 1, match:title ^(Save File)$
windowrule = float 1, match:title ^(Open File)$
windowrule = float 1, match:title ^(Select a File)$
windowrule = float 1, match:title ^(Choose Wallpaper)$
windowrule = float 1, match:title ^(Open Folder)$
windowrule = float 1, match:title ^(Save As)$
windowrule = float 1, match:title ^(Confirm to replace files)$
windowrule = float 1, match:title ^(File Operation Progress)$
windowrule = float 1, match:class ^(xdg-desktop-portal-gtk)$

# Opacity Rules
windowrule = opacity 0.95 0.95, match:class ^(kitty)$
windowrule = opacity 0.95 0.95, match:class ^(thunar)$
windowrule = opacity 0.95 0.95, match:class ^(evolution)$
windowrule = opacity 0.95 0.95, match:class ^(org.gnome.DiskUtility)$
windowrule = opacity 0.95 0.95, match:class ^(pavucontrol)$
windowrule = opacity 0.95 0.95, match:class ^(org.pulseaudio.pavucontrol)$
windowrule = opacity 0.95 0.95, match:class ^(blueman-manager)$
windowrule = opacity 0.95 0.95, match:class ^(nm-connection-editor)$


# Window Rules Section

windowrule = workspace 6 silent, match:class ^(lutris)$
windowrule = float 1, match:class ^(lutris)$
windowrule = fullscreen 1, match:class ^(gamescope)$
windowrule = no_anim 1, match:class ^(gamescope)$
windowrule = no_blur 1, match:class ^(gamescope)$
windowrule = no_dim 1, match:class ^(gamescope)$
