# Window rules

windowrule = float on, match:class ^(pavucontrol)$
windowrule = float on, match:class ^(blueman-manager)$
windowrule = float on, match:class ^(nm-connection-editor)$
windowrule = float on, match:class ^(file-roller)$
windowrule = float on, match:title ^(Picture-in-Picture)$
windowrule = opacity 0.95, match:class ^(kitty)$
windowrule = opacity 0.95, match:class ^(thunar)$
windowrule = float on, match:class ^(rofi)$

# Dedicated workspace for Todoist / Obsidian
windowrule = workspace name:todoist, match:class ^(Todoist).*$
windowrule = workspace name:obsidian, match:class ^(obsidian)$
