# Window rules

windowrulev2 = float,class:(pavucontrol)
windowrulev2 = float,class:(blueman-manager)
windowrulev2 = float,class:(nm-connection-editor)
windowrulev2 = float,class:(file-roller)
windowrulev2 = float,title:(Picture-in-Picture)
windowrulev2 = opacity 0.95,class:(kitty)
windowrulev2 = opacity 0.95,class:(thunar)
windowrulev2 = float, class:(rofi)

# Dedicated workspace for Todoist / Obsidian
windowrulev2 = workspace name:todoist, class:^(Todoist).*$
windowrulev2 = workspace name:obsidian, class:^(obsidian)$
