# SpectrumOS Hyprland Configuration
# General settings

general {
    gaps_in = 5
    gaps_out = 5
    border_size = 4
    col.active_border = $active_border_color_1 $active_border_color_2 45deg
    col.inactive_border = $inactive_border_color
    layout = master
    allow_tearing = false
}

# Misc settings
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
    vrr = 0
}
