# SpectrumOS Hyprland Configuration
# Monitor configuration
#
# Format: monitor=NAME,RESOLUTION@REFRESHRATE,POSITION,SCALE
# NAME: output name (e.g. eDP-1, HDMI-A-1, DP-1) or empty for catch-all
# POSITION: XxY coordinates (e.g. 0x0, 1920x0)
# SCALE: DPI scaling factor (1 = no scaling)
#
# Use `hyprctl monitors` to list connected monitors
# Use `wlr-randr` or `kscreen-doctor` to identify output names

# ─────────────────────────────────────────────
# PRIMARY MONITOR
# ─────────────────────────────────────────────

monitor=,1920x1080@60,0x0,1

# Other primary monitor resolutions (uncomment one, comment the active one):
# monitor=,1920x1080@144,0x0,1
# monitor=,2560x1440@60,0x0,1
# monitor=,2560x1440@144,0x0,1
# monitor=,3840x2160@60,0x0,1.5
# monitor=,3840x2160@120,0x0,2
# monitor=,1280x720@60,0x0,1
# monitor=,1366x768@60,0x0,1
# monitor=,1600x900@60,0x0,1

# ─────────────────────────────────────────────
# SECOND MONITOR (uncomment and set output name)
# ─────────────────────────────────────────────

# Placed to the right of the primary monitor (adjust POSITION if needed):
# monitor=HDMI-A-1,1920x1080@60,1920x0,1
# monitor=HDMI-A-1,1920x1080@144,1920x0,1
# monitor=HDMI-A-1,2560x1440@60,1920x0,1
# monitor=HDMI-A-1,2560x1440@144,1920x0,1
# monitor=HDMI-A-1,3840x2160@60,1920x0,1.5
# monitor=HDMI-A-1,1280x720@60,1920x0,1

# Placed above the primary monitor:
# monitor=HDMI-A-1,1920x1080@60,0x-1080,1

# Alternative output names for second monitor:
# monitor=DP-1,1920x1080@60,1920x0,1
# monitor=DP-2,1920x1080@60,1920x0,1

# ─────────────────────────────────────────────
# THIRD MONITOR (uncomment and set output name)
# ─────────────────────────────────────────────

# Placed to the right of the second monitor (assumes second at 1920x0):
# monitor=DP-2,1920x1080@60,3840x0,1
# monitor=DP-2,1920x1080@144,3840x0,1
# monitor=DP-2,2560x1440@60,3840x0,1
# monitor=DP-2,2560x1440@144,3840x0,1
# monitor=DP-2,3840x2160@60,3840x0,1.5
# monitor=DP-2,1280x720@60,3840x0,1

# Alternative output names for third monitor:
# monitor=HDMI-A-2,1920x1080@60,3840x0,1
# monitor=DP-3,1920x1080@60,3840x0,1

# ─────────────────────────────────────────────
# FALLBACK (catch-all for any unmatched monitor)
# ─────────────────────────────────────────────
# Uncomment if you want unknown monitors to auto-configure instead of being disabled:
# monitor=,preferred,auto,1
