# SpectrumOS Hyprland Configuration
# Main configuration file
# ~/.config/hypr/hyprland.conf

# Source pywal colors
source = ~/.cache/wal/colors-hyprland.conf

# Source modular configuration files
source = ~/.config/hypr/monitors.conf
